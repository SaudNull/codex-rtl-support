<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Codex RTL support before and after</title>
  <desc id="desc">A side by side comparison showing mixed Arabic and English text misaligned before the patch and properly right-to-left after the patch.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#121212" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg{fill:#f7f7f4}
      .panel{fill:#fff;stroke:#deded8;stroke-width:1;filter:url(#shadow)}
      .title{font:700 28px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#1f2328}
      .subtitle{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#656d76}
      .label{font:700 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:.06em}
      .bad{fill:#c7362e}
      .good{fill:#1a7f37}
      .bubble{fill:#f6f8fa;stroke:#d8dee4}
      .bubble-ok{fill:#f0f7f2;stroke:#b7dfc0}
      .body{font:500 23px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#24292f}
      .hint{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6e7781}
      .code{font:500 17px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#24292f}
      .code-bg{fill:#ffffff;stroke:#d8dee4}
      .arrow{stroke:#8c959f;stroke-width:2;stroke-linecap:round}
    </style>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="600" y="58" text-anchor="middle">Codex RTL Support</text>
  <text class="subtitle" x="600" y="88" text-anchor="middle">Arabic, Hebrew, Persian, Urdu, and other RTL scripts read naturally without breaking code.</text>

  <g transform="translate(70 125)">
    <rect class="panel" width="500" height="410" rx="18"/>
    <text class="label bad" x="34" y="46">WITHOUT PATCH</text>
    <text class="hint" x="34" y="78">Mixed text inherits the LTR layout.</text>
    <rect class="bubble" x="34" y="110" width="432" height="96" rx="14"/>
    <text class="body" x="58" y="152">ارفع PR في GitHub اليوم</text>
    <text class="body" x="58" y="184">وراجع README قبل patch</text>
    <line class="arrow" x1="58" y1="222" x2="200" y2="222"/>
    <text class="hint" x="58" y="250">Starts from the wrong edge</text>
    <rect class="code-bg" x="34" y="285" width="432" height="72" rx="12"/>
    <text class="code" x="58" y="329">const dir = "ltr";</text>
  </g>

  <g transform="translate(630 125)">
    <rect class="panel" width="500" height="410" rx="18"/>
    <text class="label good" x="34" y="46">WITH PATCH</text>
    <text class="hint" x="34" y="78">Mixed text uses the reading edge.</text>
    <rect class="bubble-ok" x="34" y="110" width="432" height="96" rx="14"/>
    <text class="body" direction="rtl" unicode-bidi="plaintext" x="282" y="152" text-anchor="end">ارفع PR في GitHub اليوم</text>
    <text class="body" direction="rtl" unicode-bidi="plaintext" x="282" y="184" text-anchor="end">وراجع README قبل patch</text>
    <line class="arrow" x1="442" y1="222" x2="300" y2="222"/>
    <text class="hint" x="226" y="250">Starts from the reading edge</text>
    <rect class="code-bg" x="34" y="285" width="432" height="72" rx="12"/>
    <text class="code" x="58" y="329">const dir = "ltr";</text>
  </g>
</svg>
